name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - &checkout
        name: "Checkout"
        uses: actions/checkout@v6
      - name: "Setup - StyLua"
        uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: 2.5.2
          args: false
      - name: "Setup - selene"
        env:
          SELENE_VERSION: "0.31.0"
        run: |
          curl -fsSL "https://github.com/Kampfkarren/selene/releases/download/${SELENE_VERSION}/selene-${SELENE_VERSION}-linux.zip" -o selene.zip
          unzip -o selene.zip
          chmod +x selene
          sudo mv selene /usr/local/bin/selene
      - name: "Check - Formatting"
        run: make format
      - name: "Check - Lint"
        run: make lint
  test:
    runs-on: ubuntu-latest
    steps:
      - *checkout
      - name: "Setup - Neovim"
        env:
          NEOVIM_VERSION: "0.11.7"
        run: |
          curl -fsSL "https://github.com/neovim/neovim/releases/download/v${NEOVIM_VERSION}/nvim-linux-x86_64.tar.gz" -o nvim.tar.gz
          sudo tar -C /usr/local --strip-components=1 -xzvf nvim.tar.gz
      - name: "Setup - ImageMagick, Lua 5.1, LuaRocks"
        run: |
          sudo apt-get install -y \
            imagemagick \
            liblua5.1-dev \
            lua5.1 \
            luarocks
          echo "${HOME}/.luarocks/bin" >> "${GITHUB_PATH}"
          eval "$(luarocks path --lua-version=5.1)"
          echo "LUA_PATH=${LUA_PATH}" >> "${GITHUB_ENV}"
          echo "LUA_CPATH=${LUA_CPATH}" >> "${GITHUB_ENV}"
      - name: "Setup - vusted"
        run: |
          luarocks --local --lua-version=5.1 install vusted
      - name: "Run tests"
        run: make test
